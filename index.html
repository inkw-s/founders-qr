<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNSW Founders – Feedback QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f9f7f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
      max-width: 360px;
      width: 100%;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.5rem;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 8px;
    }

    .caption {
      font-size: 1.1rem;
      font-weight: 600;
      color: #111;
      line-height: 1.4;
      margin-bottom: 0.4rem;
    }

    .sub {
      font-size: 0.82rem;
      color: #999;
      font-family: 'DM Mono', monospace;
    }

    .error {
      color: #c0392b;
      font-size: 0.9rem;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">UNSW Founders</div>
    <div id="qrcode"></div>
    <div class="caption" id="caption"></div>
    <div class="sub" id="sub">Scan to leave feedback</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const link = params.get('link');
    const caption = params.get('caption');

    if (!link) {
      document.getElementById('qrcode').innerHTML = '<p class="error">No link provided. Add ?link=YOUR_URL to the address bar.</p>';
    } else {
      new QRCode(document.getElementById('qrcode'), {
        text: link,
        width: 220,
        height: 220,
        colorDark: '#111111',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      if (caption) {
        document.getElementById('caption').textContent = caption;
      }
    }
  </script>
</body>
</html>
